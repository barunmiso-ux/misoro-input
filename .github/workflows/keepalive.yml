name: daily-restart

# 무료 Streamlit Cloud 앱이 자원 누적으로 며칠에 한 번 뻗어 수동 리붓이 필요한 문제 방지.
# 매일 아침(KST 07:30) 작은 커밋을 push → Streamlit이 자동 재배포(=자동 리붓) → 매일 새 컨테이너로 리셋.
# 재배포 후 앱을 ping 해서 출근 시간 전에 깨워둔다.
# (GitHub 예약은 UTC, 부하 시 수십 분 지연 가능)

on:
  schedule:
    - cron: "30 22 * * *"   # 07:30 KST 매일 자동 재시작
  workflow_dispatch:         # 수동 실행 = 즉시 재시작 버튼

permissions:
  contents: write

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 자동 재배포 트리거 (타임스탬프 커밋)
        run: |
          date -u +"%Y-%m-%d %H:%M:%S UTC" > .keepalive
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .keepalive
          git commit -m "chore: daily restart [skip ci]" || echo "변경 없음"
          git push || echo "push 생략"

      - name: 재배포 대기 후 앱 깨우기
        run: |
          sleep 150
          URL="https://misoro-input.streamlit.app/?branch=%EB%B6%84%EB%8B%B9"
          for i in 1 2 3 4; do
            code=$(curl -sSL -c cj -b cj --max-redirs 10 -o /dev/null -w "%{http_code}" "$URL" || echo ERR)
            echo "ping $i -> HTTP $code"
            sleep 30
          done
          rm -f cj
